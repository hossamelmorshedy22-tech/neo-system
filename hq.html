<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO CAFÉ - الإدارة العليا (HQ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --primary: #d4af37; --qotour: #27ae60; --qallin: #3498db; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #334155; }
        .header h1 { color: var(--primary); font-weight: 900; letter-spacing: 2px; }
        .header p { color: #94a3b8; font-size: 14px; }
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; position: relative; overflow: hidden; border: 1px solid #334155; }
        .card h3 { font-size: 16px; color: #cbd5e1; margin-bottom: 15px; }
        .card .val { font-size: 35px; font-weight: 900; color: white; }
        .card .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 10px; }
        
        .card.total { border-bottom: 4px solid var(--primary); }
        .card.qotour { border-bottom: 4px solid var(--qotour); }
        .card.qallin { border-bottom: 4px solid var(--qallin); }
        
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .chart-box h3 { text-align: center; color: #cbd5e1; margin-bottom: 15px; }
        .canvas-wrapper { position: relative; height: 300px; width: 100%; }

        .loader { text-align: center; font-size: 20px; color: var(--primary); margin-top: 50px; font-weight: bold; }
        
        @media (max-width: 800px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEO CAFÉ - HQ</h1>
        <p>شاشة الإدارة المركزية (قطور & قلين)</p>
    </div>

    <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> جاري سحب البيانات من الفروع...</div>

    <div id="dashboardData" style="display: none;">
        <div class="grid-cards">
            <div class="card total">
                <h3>إجمالي إيرادات الشركة (اليوم)</h3>
                <div class="val" id="total_sales">0 ج</div>
                <div class="badge" style="background: rgba(212, 175, 55, 0.2); color: var(--primary);"><i class="fas fa-crown"></i> الإمبراطورية</div>
            </div>
            <div class="card qotour">
                <h3>مبيعات فرع قطور (اليوم)</h3>
                <div class="val" id="qotour_sales">0 ج</div>
                <div class="badge" style="background: rgba(39, 174, 96, 0.2); color: var(--qotour);">الفرع الرئيسي</div>
            </div>
            <div class="card qallin">
                <h3>مبيعات فرع قلين (اليوم)</h3>
                <div class="val" id="qallin_sales">0 ج</div>
                <div class="badge" style="background: rgba(52, 152, 219, 0.2); color: var(--qallin);">الفرع الجديد</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h3>مقارنة مبيعات الفروع (آخر 7 أيام)</h3>
                <div class="canvas-wrapper"><canvas id="barChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h3>نسبة المساهمة (اليوم)</h3>
                <div class="canvas-wrapper"><canvas id="pieChart"></canvas></div>
            </div>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBAK0shADLVnGHJaApl69RVGrKvo4FQAX0", authDomain: "neo-cafe-c37a2.firebaseapp.com", databaseURL: "https://neo-cafe-c37a2-default-rtdb.firebaseio.com", projectId: "neo-cafe-c37a2" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function getBusinessDate(dateObj) { let d = new Date(dateObj); if (d.getHours() < 5) d.setDate(d.getDate() - 1); return d.toISOString().split('T')[0]; }
        function safeNum(v) { let n = parseFloat(v); return isNaN(n) ? 0 : n; }

        let qotourSalesData = [];
        let qallinSalesData = [];
        let dataLoaded = 0;

        // جلب داتا قطور
        database.ref('NeoCafe/neo_sales_v2').on('value', snap => {
            if(snap.exists()) qotourSalesData = snap.val() || [];
            checkDataReady();
        });

        // جلب داتا قلين
        database.ref('NeoCafe_Qallin/qallin_sales_v1').on('value', snap => {
            if(snap.exists()) qallinSalesData = snap.val() || [];
            checkDataReady();
        });

        function checkDataReady() {
            dataLoaded++;
            if(dataLoaded >= 2) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboardData').style.display = 'block';
                processHQData();
            }
        }

        let barChartObj = null;
        let pieChartObj = null;

        function processHQData() {
            const todayStr = getBusinessDate(new Date());
            
            // تجميع اليوم
            let qotourToday = qotourSalesData.filter(s => s.type !== 'debt_payment' && getBusinessDate(s.date) === todayStr).reduce((a,b) => a + safeNum(b.total), 0);
            let qallinToday = qallinSalesData.filter(s => s.type !== 'debt_payment' && getBusinessDate(s.date) === todayStr).reduce((a,b) => a + safeNum(b.total), 0);
            
            document.getElementById('qotour_sales').innerText = qotourToday.toLocaleString() + ' ج';
            document.getElementById('qallin_sales').innerText = qallinToday.toLocaleString() + ' ج';
            document.getElementById('total_sales').innerText = (qotourToday + qallinToday).toLocaleString() + ' ج';

            // تجميع آخر 7 أيام للرسم البياني
            let last7Days = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                last7Days.push(getBusinessDate(d));
            }

            let qotour7Days = last7Days.map(dateStr => qotourSalesData.filter(s => s.type !== 'debt_payment' && getBusinessDate(s.date) === dateStr).reduce((a,b) => a + safeNum(b.total), 0));
            let qallin7Days = last7Days.map(dateStr => qallinSalesData.filter(s => s.type !== 'debt_payment' && getBusinessDate(s.date) === dateStr).reduce((a,b) => a + safeNum(b.total), 0));
            let displayLabels = last7Days.map(d => d.substring(5)); // إظهار الشهر واليوم فقط

            drawHQCharts(qotourToday, qallinToday, displayLabels, qotour7Days, qallin7Days);
        }

        function drawHQCharts(qToday, qalToday, labels, qData, qalData) {
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Cairo';

            const barCtx = document.getElementById('barChart');
            const pieCtx = document.getElementById('pieChart');

            if(barChartObj) barChartObj.destroy();
            if(pieChartObj) pieChartObj.destroy();

            // رسم المقارنة
            barChartObj = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'قطور', data: qData, backgroundColor: '#27ae60', borderRadius: 4 },
                        { label: 'قلين', data: qalData, backgroundColor: '#3498db', borderRadius: 4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } } }
            });

            // رسم المساهمة
            let total = qToday + qalToday;
            let pieData = total === 0 ? [1] : [qToday, qalToday];
            let pieColors = total === 0 ? ['#334155'] : ['#27ae60', '#3498db'];
            let pieLabels = total === 0 ? ['لا توجد مبيعات اليوم'] : ['قطور', 'قلين'];

            pieChartObj = new Chart(pieCtx, {
                type: 'doughnut',
                data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });
        }
    </script>
</body>
</html>
